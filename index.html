<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tran Hoa Computer - Sửa Chữa Máy Tính Uy Tín Tại Phú Thịnh-Thái Nguyên</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <!-- Cập nhật CDN Tailwind để tương thích tốt với GitHub Pages -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Roboto', sans-serif; }
        body { background-color: #f8fafc; color: #1e293b; line-height: 1.6; }
        
        .top-bar { background-color: #0f172a; color: #fff; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; font-size: 14px; font-weight: 500; }
        .top-bar .time { color: #38bdf8; }
        .top-bar .phone { color: #facc15; text-decoration: none; font-weight: bold; }
        
        .hero-section { background-color: #0f172a; color: #fff; text-align: center; padding: 60px 20px 80px 20px; }
        .hero-tag { background-color: #1e293b; color: #38bdf8; display: inline-block; padding: 6px 16px; border-radius: 20px; font-size: 13px; margin-bottom: 18px; font-weight: bold; border: 1px solid #334155; }
        .hero-section h2 { font-size: 32px; margin-bottom: 15px; letter-spacing: 0.5px; font-weight: 900; }
        .hero-section p { font-size: 14px; color: #94a3b8; max-width: 650px; margin: 0 auto; font-weight: 300; }
        
        .container { max-width: 850px; margin: 20px auto; padding: 0 15px; }
        .section-title { text-align: center; color: #2563eb; font-size: 18px; margin: 40px 0 20px 0; text-transform: uppercase; font-weight: bold; letter-spacing: 0.5px; }
        
        .table-responsive { width: 100%; background-color: #fff; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.03); margin-bottom: 35px; border: 1px solid #e2e8f0; overflow: hidden; }
        .menu-toggle { display: none; background: none; border: none; font-size: 24px; cursor: pointer; color: #0f172a; padding: 4px; }
        .nav-menu { display: flex; gap: 20px; align-items: center; }
        .nav-menu a { color: #0f172a; text-decoration: none; font-size: 14px; font-weight: bold; transition: color 0.2s; }
        .nav-menu a:hover { color: #2563eb; }

        .booking-form { background-color: #fff; padding: 35px 25px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.06); margin-top: -50px; position: relative; z-index: 10; border: 1px solid #e2e8f0; }
        .form-title { font-size: 20px; font-weight: bold; color: #1e40af; margin-bottom: 12px; text-align: center; }
        .form-desc { font-size: 13px; color: #64748b; margin-bottom: 25px; font-weight: 300; text-align: center; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 8px; color: #334155; }
        .form-control { width: 100%; padding: 12px 14px; border: 1px solid #cbd5e1; border-radius: 12px; font-size: 14px; background-color: #f8fafc; transition: all 0.2s; }
        .form-control:focus { outline: none; border-color: #2563eb; background-color: #fff; box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }
        .form-row { display: flex; gap: 15px; }
        .form-row .form-group { flex: 1; }
        
        .btn-submit { width: 100%; background-color: #2563eb; color: #fff; border: none; padding: 15px; border-radius: 12px; font-size: 15px; font-weight: bold; cursor: pointer; margin-top: 5px; margin-bottom: 10px; text-transform: uppercase; transition: all 0.2s; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2); }
        .btn-submit:hover { background-color: #1d4ed8; box-shadow: 0 6px 16px rgba(37, 99, 235, 0.3); }
        
        .commit-list { background-color: #fff; padding: 25px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.03); margin-bottom: 20px; border: 1px solid #e2e8f0; }
        .commit-list ul { padding-left: 0; }
        .commit-list li { position: relative; padding-left: 26px; margin-bottom: 14px; font-size: 14px; color: #475569; text-align: justify; list-style: none; }
        .commit-list li::before { content: "✓"; color: #10b981; font-weight: bold; font-size: 16px; position: absolute; left: 0; top: 0; }
        
        .logo-animation { font-size: 20px; font-weight: 900; margin: 0; text-transform: uppercase; letter-spacing: 0.5px; background: linear-gradient(to right, #0f172a 0%, #2563eb 50%, #0f172a 100%); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shineText 3s linear infinite; }
        .slogan-animation { font-size: 11px; margin: 2px 0 0 0; text-transform: uppercase; letter-spacing: 1.5px; font-weight: bold; background: linear-gradient(to right, #ea580c 0%, #facc15 50%, #ea580c 100%); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shineText 4s linear infinite; }
        @keyframes shineText { 0% { background-position: 0% center; } 100% { background-position: 200% center; } }
        
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background-color: rgba(255, 255, 255, 0.95); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); display: flex; justify-content: space-around; align-items: center; padding: 10px 0 calc(10px + env(safe-area-inset-bottom)); box-shadow: 0 -10px 30px rgba(0, 0, 0, 0.08); z-index: 99999; border-top: 1px solid #e2e8f0; }
        .nav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; text-decoration: none; color: #64748b; font-size: 11px; font-weight: 500; flex: 1; gap: 4px; }
        .nav-item.active-booking { color: #2563eb; font-weight: bold; }
        .booking-icon-wrapper { background-color: #2563eb; color: white; width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 14px rgba(37, 99, 235, 0.4); margin-top: -24px; border: 4px solid #fff; animation: bounceLight 2s infinite; }
        @keyframes bounceLight { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
        
        @media (max-width: 767px) {
            body { padding-bottom: 95px !important; }
            .menu-toggle { display: block; }
            .nav-menu { display: none; width: 100%; flex-direction: column; gap: 0; background-color: #ffffff; position: absolute; top: 100%; left: 0; border-bottom: 1px solid #e2e8f0; padding: 10px 20px; box-shadow: 0 10px 15px rgba(0,0,0,0.05); }
            .nav-menu.show { display: flex; }
            .nav-menu a { width: 100%; padding: 12px 0; border-bottom: 1px solid #f1f5f9; font-size: 15px; }
            table thead { display: none; }
            table, table tbody, table tr, table td { display: block; width: 100%; }
            table tr { border-bottom: 1px solid #f1f5f9; padding: 18px 14px; background: #fff; }
            table td { border: none !important; padding: 6px 0 !important; font-size: 14px !important; text-align: left !important; }
            .mobile-label { display: inline-block; width: 110px; font-weight: 700; color: #64748b; font-size: 12px; text-transform: uppercase; flex-shrink: 0; }
            .mobile-row { display: flex; align-items: flex-start; }
            .mobile-value { flex: 1; color: #334155; }
            .highlight-error { color: #1e40af; font-weight: 700; }
            .highlight-price { color: #dc2626; font-weight: 700; }
        }
        
        @media (min-width: 768px) {
            .bottom-nav { display: none !important; }
            .mobile-label { display: none; }
            table { width: 100%; border-collapse: collapse; table-layout: fixed; }
            th, td { border: 1px solid #f1f5f9; padding: 14px 12px; font-size: 14px; vertical-align: top; }
            th { background-color: #f8fafc; color: #475569; font-weight: 700; text-transform: uppercase; font-size: 13px; text-align: center; border-bottom: 2px solid #e2e8f0; }
            tr:nth-child(even) { background-color: #fafafa; }
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="time">🕒 Giờ làm việc: 07:00 - 22:00 (Thứ 2 - Chủ Nhật)</div>
        <div>📞 Hotline: <a href="tel:0963284044" class="phone">0963.284.044</a></div>
    </div>
    
    <div style="background-color: rgba(255, 255, 255, 0.95); backdrop-filter: blur(8px); padding: 15px 20px; border-bottom: 1px solid #e2e8f0; position: sticky; top: 0; z-index: 9999;">
        <div style="display: flex; justify-content: space-between; align-items: center; width: 100%; position: relative;">
            <div style="text-align: left;">
                <h1 class="logo-animation">Tran Hoa Computer</h1>
                <p class="slogan-animation">Uy Tín Tạo Niềm Tin</p>
            </div>
            <div class="nav-menu" id="menuNavbar">
                <a href="#datlich-sua-chua">📅 Đặt lịch</a>
                <a href="#bang-gia-phan-cung">💻 Sửa Phần cứng</a>
                <a href="#bang-gia-phan-mem">💿 Cài Phần mềm</a>
            </div>
            <button class="menu-toggle" id="menuBtn">☰</button>
        </div>
    </div>
    
    <div class="hero-section">
        <h2>TRAN HOA COMPUTER</h2>
        <p>Trung tâm sửa chữa, lắp ráp, nâng cấp Laptop, PC uy tín tại Phú Thịnh - Thái Nguyên.</p>
    </div>
    
    <div class="container">
        <!-- FORM ĐẶT LỊCH CẬP NHẬT GỬI VỀ EMAIL -->
        <div id="datlich-sua-chua" class="booking-form">
            <div class="form-title">📝 ĐẶT LỊCH SỬA MÁY TÍNH</div>
            <form action="https://formsubmit.co/hoaptdt2005@gmail.com" method="POST">
                <input type="hidden" name="_captcha" value="false">
                <input type="hidden" name="_next" value="https://tranhoacomputer.github.io/">
                <div class="form-group">
                    <label>Họ và tên khách hàng *</label>
                    <input type="text" name="fullname" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Số điện thoại *</label>
                    <input type="tel" name="phone" class="form-control" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Ngày sửa *</label>
                        <input type="date" name="date" class="form-control" required>
                    </div>
                </div>
                <button type="submit" class="btn-submit">Gửi Yêu Cầu Đặt Lịch</button>
            </form>
        </div>
        
        <!-- Các phần bảng giá và nội dung giữ nguyên... -->
    </div>
    
    <script>
        document.getElementById('menuBtn').addEventListener('click', function() {
            document.getElementById('menuNavbar').classList.toggle('show');
        });
    </script>
</body>
</html>
