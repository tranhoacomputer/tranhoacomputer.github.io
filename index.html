<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tran Hoa Computer - Sửa Chữa Máy Tính Uy Tín</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .form-control { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; margin-bottom: 15px; }
        .btn-submit { width: 100%; background-color: #2563eb; color: #fff; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body class="bg-gray-100 p-4">

    <div class="max-w-xl mx-auto bg-white p-6 rounded-2xl shadow-lg">
        <h2 class="text-2xl font-bold text-center mb-6 text-blue-700">📝 ĐẶT LỊCH SỬA MÁY</h2>
        
        <form action="https://formsubmit.co/hoaptdt2005@gmail.com" method="POST">
            
            <input type="hidden" name="_captcha" value="false">
            <input type="hidden" name="_next" value="https://tranhoacomputer.github.io">
            <input type="hidden" name="_subject" value="Đơn đặt lịch sửa máy mới từ Website!">

            <label class="block mb-2 font-medium">Họ và tên *</label>
            <input type="text" name="fullname" required class="form-control">

            <label class="block mb-2 font-medium">Số điện thoại *</label>
            <input type="tel" name="phone" required class="form-control">

            <label class="block mb-2 font-medium">Chọn ngày</label>
            <input type="date" name="date" class="form-control">

            <label class="block mb-2 font-medium">Tình trạng máy</label>
            <textarea name="note" class="form-control"></textarea>

            <button type="submit" class="btn-submit hover:bg-blue-800">GỬI YÊU CẦU ĐẶT LỊCH</button>
        </form>
    </div>

</body>
</html>
