<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tran Hoa Computer - Sửa Chữa Máy Tính Uy Tín Tại Phú Thịnh-Thái Nguyên</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Roboto', sans-serif; }
        body { background-color: #f8fafc; color: #1e293b; line-height: 1.6; }
        .top-bar { background-color: #0f172a; color: #fff; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; font-size: 14px; font-weight: 500; }
        .top-bar .time { color: #38bdf8; }
        .top-bar .phone { color: #facc15; text-decoration: none; font-weight: bold; }
                .hero-section { background-color: #0f172a; color: #fff; text-align: center; padding: 60px 20px 80px 20px; }
        .hero-tag { background-color: #1e293b; color: #38bdf8; display: inline-block; padding: 6px 16px; border-radius: 20px; font-size: 13px; margin-bottom: 18px; font-weight: bold; border: 1px solid #334155; }
        .hero-section h2 { font-size: 32px; margin-bottom: 15px; letter-spacing: 0.5px; font-weight: 900; }
        .container { max-width: 850px; margin: 20px auto; padding: 0 15px; }
        .section-title { text-align: center; color: #2563eb; font-size: 18px; margin: 40px 0 20px 0; text-transform: uppercase; font-weight: bold; }
        .table-responsive { width: 100%; background-color: #fff; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.03); margin-bottom: 35px; border: 1px solid #e2e8f0; overflow: hidden; }
        .menu-toggle { display: none; background: none; border: none; font-size: 24px; cursor: pointer; color: #0f172a; padding: 4px; }
        .nav-menu { display: flex; gap: 20px; align-items: center; }
                .booking-form { background-color: #fff; padding: 35px 25px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.06); margin-top: -50px; position: relative; z-index: 10; border: 1px solid #e2e8f0; }
        .form-control { width: 100%; padding: 12px 14px; border: 1px solid #cbd5e1; border-radius: 12px; font-size: 14px; background-color: #f8fafc; }
        .btn-submit { width: 100%; background-color: #2563eb; color: #fff; border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .commit-list li { position: relative; padding-left: 26px; margin-bottom: 14px; font-size: 14px; list-style: none; }
        .commit-list li::before { content: "✓"; color: #10b981; font-weight: bold; position: absolute; left: 0; }
        @media (max-width: 767px) { .menu-toggle { display: block; } .nav-menu { display: none; width: 100%; flex-direction: column; background: #fff; position: absolute; top: 100%; left: 0; padding: 10px 20px; } .nav-menu.show { display: flex; } }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="time">🕒 Giờ làm việc: 07:00 - 22:00</div>
        <div>📞 Hotline: <a href="tel:0963284044" class="phone">0963.284.044</a></div>
    </div>
    <div style="background: #fff; padding: 15px 20px; position: sticky; top: 0; z-index: 999; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center;">
        <h1 style="font-weight: 900; font-size: 20px;">TRAN HOA COMPUTER</h1>
        <div class="nav-menu" id="menuNavbar">
            <a href="#datlich-sua-chua">📅 Đặt lịch</a>
            <a href="#bang-gia-phan-cung">💻 Sửa máy</a>
            <a href="#bang-gia-phan-mem">💿 Phần mềm</a>
        </div>
        <button class="menu-toggle" id="menuBtn">☰</button>
    </div>
    <div class="hero-section">
        <h2>TRAN HOA COMPUTER</h2>
        <p>Trung tâm sửa chữa, lắp ráp, nâng cấp Laptop, PC uy tín hàng đầu tại Thái Nguyên.</p>
    </div>
        <div class="container" id="datlich-sua-chua">
        <form name="dat-lich-sua-chua" method="POST" data-netlify="true" class="booking-form">
            <div style="text-align: center; font-weight: bold; margin-bottom: 20px;">📝 ĐẶT LỊCH SỬA MÁY</div>
            <input type="text" name="fullname" class="form-control" placeholder="Họ và tên" required style="margin-bottom:15px;">
            <input type="tel" name="phone" class="form-control" placeholder="Số điện thoại" required style="margin-bottom:15px;">
            <button type="submit" class="btn-submit">Gửi Yêu Cầu</button>
        </form>
    </div>
    <script>
        const menuBtn = document.getElementById('menuBtn');
        const menuNavbar = document.getElementById('menuNavbar');
        menuBtn.addEventListener('click', (e) => { e.stopPropagation(); menuNavbar.classList.toggle('show'); });
        document.addEventListener('click', () => menuNavbar.classList.remove('show'));
    </script>
</body>
</html>
