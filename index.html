<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tran Hoa Computer - Dịch vụ sửa chữa uy tín</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hover-card:hover { transform: translateY(-5px); transition: 0.3s; }
        .sticky-btn { position: fixed; bottom: 20px; right: 20px; z-index: 99; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">

    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-4xl mx-auto p-4 flex justify-between items-center">
            <h1 class="font-black text-blue-700 text-xl">TRAN HOA COMPUTER</h1>
            <a href="tel:0963284044" class="bg-blue-600 text-white px-4 py-2 rounded-full font-bold text-sm">📞 0963.284.044</a>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-4 space-y-8">
        <section class="bg-blue-900 text-white p-8 rounded-3xl text-center">
            <h2 class="text-3xl font-bold mb-2">Sửa máy tính tận tâm</h2>
            <p class="text-blue-200">Uy tín tại Phú Thịnh - Thái Nguyên</p>
        </section>

        <section class="bg-white p-6 rounded-3xl shadow-lg border border-slate-100">
            <h3 class="text-xl font-bold mb-6 text-center">📝 Đặt lịch sửa máy</h3>
            <form action="https://formsubmit.co/hoaptdt2005@gmail.com" method="POST" class="space-y-4">
                <input type="hidden" name="_captcha" value="false">
                <input type="hidden" name="_next" value="https://tranhoacomputer.github.io">
                
                <input type="text" name="name" placeholder="Họ và tên" required class="w-full p-4 bg-slate-50 border rounded-xl outline-blue-500">
                <input type="tel" name="phone" placeholder="Số điện thoại" required class="w-full p-4 bg-slate-50 border rounded-xl outline-blue-500">
                <textarea name="note" placeholder="Mô tả tình trạng máy..." class="w-full p-4 bg-slate-50 border rounded-xl outline-blue-500 h-28"></textarea>
                <button type="submit" class="w-full bg-blue-600 text-white p-4 rounded-xl font-bold hover:bg-blue-700">GỬI YÊU CẦU</button>
            </form>
        </section>

        <section class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="bg-white p-6 rounded-2xl shadow-sm border hover-card">
                <h4 class="font-bold text-lg text-blue-600 mb-2">💻 Phần cứng</h4>
                <p class="text-sm text-slate-600">Thay thế linh kiện, vệ sinh, sửa nguồn chuyên nghiệp.</p>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border hover-card">
                <h4 class="font-bold text-lg text-blue-600 mb-2">⚙️ Phần mềm</h4>
                <p class="text-sm text-slate-600">Cài Windows, Office, khử virus, tối ưu hệ thống.</p>
            </div>
        </section>
    </main>

    <a href="tel:0963284044" class="sticky-btn bg-green-500 text-white p-4 rounded-full shadow-lg">📞</a>
</body>
</html>
